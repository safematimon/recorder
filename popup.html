<!doctype html>
<html lang="th">
  <head>
    <meta charset="UTF-8" />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="header-row">
      <h2>Auto Recorder</h2>
      <div class="tooltip-container">
        <div class="tooltip-trigger">💡</div>
        <div class="tooltip-content">
          <strong>💡 Recording Shortcuts:</strong>
          <div>
            <span class="kbd">Alt</span> + <span class="kbd">S</span> : 📸 Take
            Screenshot
          </div>
          <div>
            <span class="kbd">Alt</span> + <span class="kbd">W</span> : ⏳ Wait
            for Text (Highlight first)
          </div>
          <div style="margin-top: 5px; color: #888">
            *Mac users: Use Option instead of Alt
          </div>
        </div>
      </div>
    </div>

    <div class="status" id="statusText">🔴 Stopped</div>

    <div class="toggle-group">
      <button id="btnRobot" class="toggle-btn active">🤖 Robot</button>
      <button id="btnPlaywright" class="toggle-btn">🎭 Playwright</button>
    </div>

    <div class="controls">
      <button id="startBtn">▶ Start</button>
      <button id="stopBtn">⏹ Stop</button>
      <button id="clearBtn">🗑 Clear</button>
    </div>

    <pre id="scriptDisplay">ยังไม่มีการบันทึก...</pre>

    <div class="copy-container">
      <span id="copyText">📋 Copy to Clipboard</span>
    </div>

    <button id="downloadBtn">⬇️ Download File</button>

    <script src="popup.js"></script>
  </body>
</html>
