<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Robot Recorder</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <header>
      <h1>Robot Recorder</h1>
      <div class="status-badge" id="statusBadge">Ready</div>
    </header>
    
    <main>
      <div class="controls">
        <button id="btnRecord" class="btn btn-primary">
          <span class="icon">●</span> Start Recording
        </button>
      </div>

      <div class="log-container">
        <h3>Recorded Steps</h3>
        <ul id="stepsList" class="steps-list">
          <li class="empty-state">No actions recorded yet...</li>
        </ul>
      </div>
    </main>

    <footer>
      <div class="actions-group">
        <button id="btnCopy" class="btn btn-secondary" disabled>Copy</button>
        <button id="btnDownload" class="btn btn-secondary" disabled>Download .robot</button>
      </div>
      <button id="btnClear" class="btn-text">Clear All</button>
    </footer>
  </div>
  <script src="popup.js"></script>
</body>
</html>
