<!doctype html>
<html lang="th">
  <head>
    <meta charset="UTF-8" />
    <style>
      body {
        width: 350px;
        padding: 15px;
        font-family: sans-serif;
      }
      .controls {
        display: flex;
        gap: 8px;
        margin-bottom: 10px;
      }
      button {
        padding: 8px 12px;
        cursor: pointer;
        border: none;
        border-radius: 4px;
        color: white;
        font-weight: bold;
        flex-grow: 1;
      }
      #startBtn {
        background: #28a745;
      }
      #stopBtn {
        background: #dc3545;
        display: none;
      }
      #clearBtn {
        background: #6c757d;
      }
      #downloadBtn {
        background: #007bff;
        width: 100%;
        margin-top: 10px;
      }
      pre {
        background: #f8f9fa;
        padding: 10px;
        border: 1px solid #ddd;
        height: 200px;
        overflow-y: auto;
        font-size: 12px;
        white-space: pre-wrap;
        color: #333;
      }
      .status {
        margin-bottom: 10px;
        font-weight: bold;
        font-size: 14px;
      }
    </style>
  </head>
  <body>
    <h2>Robot Recorder 🤖</h2>
    <div class="status" id="statusText">🔴 Stopped</div>

    <div class="controls">
      <button id="startBtn">▶ Start</button>
      <button id="stopBtn">⏹ Stop</button>
      <button id="clearBtn">🗑 Clear</button>
    </div>

    <pre id="scriptDisplay">ยังไม่มีการบันทึก...</pre>
    <button id="downloadBtn">⬇️ Download .robot</button>

    <script src="popup.js"></script>
  </body>
</html>
